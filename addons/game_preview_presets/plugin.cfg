[plugin]

name="Godot Game Preview Preset"
description="Adds a Unity-style Game View workflow to Godot's built-in embedded Game tab. Provides aspect-ratio and resolution presets, custom sizes, live responsive preview switching, non-destructive play overrides, screenshots, and game-viewport frame capture saved inside the project."
author="Rohan Sen"
version="1.0.0"
script="plugin.gd"
